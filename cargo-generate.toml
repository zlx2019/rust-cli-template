[template]
# cargo-generate minimum version
cargo_generate_version = ">=0.19.0"
include = [
  "Cargo.toml",
  "README-TEMPLATE.md",
  "licenses/LICENSE-MIT",
  "licenses/LICENSE-Apache-2.0",
  "licenses/LICENSE-GPL-3.0"
]

[hooks]
pre = ["pre-script.rhai"]
post = ["post-script.rhai"]

[placeholders]
# Github username
gh_username = { type = "string", prompt = "What is your Github username?", default = "zlx2019" }
# Project Description
description = { type = "string", prompt = "What is the description of this project?", default = "I haven't decided yet."}
# Open source license
license = { type = "string", prompt = "Please select the open-source license to use?", choices = ["MIT", "Apache-2.0", "GPL-3.0"], default = "MIT" }

# 一些常用的基础库
ask_common_libs = {
  type = "array",
  prompt = "Do you need some common crates?",
  choices = ["uuid", "rand", "serde_json", "chrono", "reqwest", "tracing"],
  default = [],
}

# Asynchronous runtime
ask_for_async = { type = "bool", prompt = "Is an asynchronous runtime needed?", default = false }
[conditional.'ask_for_async'.placeholders.multi_choice]
type = "array"
prompt = "Choose the features to enable for Tokio"
choices = ["full", "rt", "rt-multi-thread", "net", "time", "sync", "macros"]
default = ["full"]
