name: Release

# 推送 v* 标签时，生成 Changelog、创建 GitHub Release 并附加多平台构建产物
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  changelog:
    name: Changelog
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: CHANGES.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body_path: CHANGES.md
          token: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build ${{ matrix.target }}
    if: github.repository != 'zlx2019/rust-cli-template'
    needs: changelog
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}
      - name: Resolve binary name
        id: meta
        shell: bash
        run: echo "bin=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].name')" >> "$GITHUB_OUTPUT"
      # Compile and package (Unix → tar.gz, Windows → zip) and attach to Release.
      - name: Build and upload
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: ${{ steps.meta.outputs.bin }}
          target: ${{ matrix.target }}
          archive: $bin-$tag-$target
          include: README.md,LICENSE
          leading-dir: true
          token: ${{ secrets.GITHUB_TOKEN }}
